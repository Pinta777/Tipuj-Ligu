<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tipuj Ligu — Chance Liga 26/27</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --bg: #F4F6F2; --surface: #FFFFFF; --ink: #12251C; --ink-dim: #6B7C72; --line: #E3E8DF;
    --pitch: #1C8B54; --pitch-dark: #146B41; --amber: #EFA23A; --correct: #1FA968; --wrong: #D65B45; --pending: #C9CFC5;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { color: var(--ink); font-family: 'Inter', sans-serif; min-height: 100vh; }
  .tl-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 18px 22px; background: var(--surface); border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .tl-brand { display: flex; align-items: baseline; gap: 10px; }
  .tl-logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: -0.02em; }
  .tl-logo em { font-style: normal; color: var(--pitch); }
  .tl-sub { font-size: 12px; color: var(--ink-dim); font-weight: 500; }
  .tl-header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .tl-admin-pill { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; background: var(--surface); border: 1.5px solid var(--line); color: var(--ink-dim); padding: 8px 14px; border-radius: 20px; cursor: pointer; transition: all .15s ease; }
  .tl-admin-pill:hover { border-color: var(--pitch); color: var(--pitch); }
  .tl-admin-pill.on { border-color: var(--pitch); background: var(--pitch); color: #fff; }
  .tl-pinbox { display: flex; gap: 6px; align-items: center; }
  .tl-pinbox input { width: 90px; background: var(--bg); border: 1.5px solid var(--line); color: var(--ink); font-family: 'Inter', sans-serif; padding: 7px 10px; border-radius: 8px; letter-spacing: 3px; }
  .tl-pinbox input:focus { outline: none; border-color: var(--pitch); }
  .tl-pin-err { color: var(--wrong); font-size: 11px; font-weight: 600; }
  .tl-refresh-pill { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; background: var(--surface); border: 1.5px solid var(--line); color: var(--ink-dim); padding: 8px 14px; border-radius: 20px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all .15s ease; }
  .tl-refresh-pill:hover:not(:disabled) { border-color: var(--pitch); color: var(--pitch); }
  .tl-refresh-pill:disabled { cursor: default; opacity: .8; }
  .tl-refresh-pill.done { border-color: var(--correct); color: var(--correct); }
  .tl-refresh-icon { display: inline-block; font-size: 14px; line-height: 1; }
  .tl-refresh-pill.spinning .tl-refresh-icon { animation: tl-spin 0.7s linear infinite; }
  @keyframes tl-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .tl-save-indicator { font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 20px; display: inline-flex; align-items: center; gap: 8px; }
  .tl-save-indicator.saving { color: var(--ink-dim); background: var(--bg); }
  .tl-save-indicator.saved { color: var(--correct); background: rgba(31,169,104,0.1); }
  .tl-save-indicator.error { color: var(--wrong); background: rgba(214,91,69,0.1); }
  .tl-retry { font-size: 11px; font-weight: 700; text-decoration: underline; background: none; border: none; color: var(--wrong); cursor: pointer; padding: 0; }
  .tl-setup-banner { margin: 16px 22px 0; padding: 14px 16px; background: #fff8e6; border: 1.5px solid var(--amber); border-radius: 10px; font-size: 13px; line-height: 1.6; }
  .tl-setup-banner code { background: #fff; border: 1px solid var(--line); padding: 2px 6px; border-radius: 6px; font-size: 12px; word-break: break-all; }
  .tl-nav { display: flex; gap: 4px; padding: 14px 22px 0; background: var(--surface); border-bottom: 1px solid var(--line); }
  .tl-navitem { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px; padding: 10px 4px; margin-right: 22px; color: var(--ink-dim); cursor: pointer; border-bottom: 3px solid transparent; }
  .tl-navitem.active { color: var(--ink); border-bottom-color: var(--pitch); }
  .tl-body { padding: 20px 22px 48px; max-width: 900px; margin: 0 auto; }
  .tl-roundbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 18px; }
  .tl-round-chip { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 13px; padding: 7px 16px; border: 1.5px solid var(--line); color: var(--ink-dim); background: var(--surface); border-radius: 20px; cursor: pointer; }
  .tl-round-chip.active { color: #fff; background: var(--ink); border-color: var(--ink); }
  .tl-add-round { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; padding: 7px 14px; background: transparent; border: 1.5px dashed var(--pitch); color: var(--pitch); border-radius: 20px; cursor: pointer; }
  .tl-empty { color: var(--ink-dim); font-size: 14px; padding: 36px 16px; text-align: center; border: 1.5px dashed var(--line); border-radius: 12px; background: var(--surface); }
  .tl-round-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .tl-round-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; }
  .tl-round-actions { display: flex; gap: 14px; align-items: center; }
  .tl-edit-round { background: none; border: none; color: var(--pitch); font-size: 12px; font-weight: 600; cursor: pointer; opacity: .85; }
  .tl-edit-round:hover { opacity: 1; }
  .tl-del-round { background: none; border: none; color: var(--wrong); font-size: 12px; font-weight: 600; cursor: pointer; opacity: .75; }
  .tl-del-round:hover { opacity: 1; }
  .tl-match-card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; margin-bottom: 14px; box-shadow: 0 1px 2px rgba(18,37,28,0.04); }
  .tl-match-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
  .tl-teams { font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 600; }
  .tl-teams .vs { color: var(--ink-dim); font-weight: 400; margin: 0 8px; font-size: 14px; }
  .tl-date { color: var(--ink-dim); font-size: 12px; margin-top: 3px; }
  .tl-edit-fields { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .tl-edit-fields input { background: var(--bg); border: 1.5px solid var(--line); color: var(--ink); font-family: 'Inter', sans-serif; padding: 7px 9px; border-radius: 8px; font-size: 13px; }
  .tl-edit-fields input.teams { width: 140px; }
  .tl-edit-fields input.date { width: 120px; }
  .tl-segmented { display: inline-flex; border: 1.5px solid var(--line); border-radius: 10px; overflow: hidden; }
  .tl-seg-btn { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700; padding: 6px 12px; background: var(--surface); color: var(--ink-dim); border: none; border-right: 1.5px solid var(--line); cursor: default; }
  .tl-seg-btn:last-child { border-right: none; }
  .tl-seg-btn.clickable { cursor: pointer; }
  .tl-seg-btn.clickable:hover { background: var(--bg); }
  .tl-seg-btn.result-active { background: var(--ink); color: #fff; }
  .tl-tip-rows { display: flex; flex-direction: column; gap: 8px; }
  .tl-tip-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 6px 2px; border-top: 1px solid var(--line); }
  .tl-tip-row:first-child { border-top: none; padding-top: 0; }
  .tl-tip-player { font-size: 13px; font-weight: 600; color: var(--ink); min-width: 64px; }
  .tl-seg-btn.tip-empty { color: var(--pending); }
  .tl-seg-btn.tip-active { background: var(--ink); color: #fff; }
  .tl-seg-btn.tip-correct { background: var(--correct); color: #fff; border-color: var(--correct); }
  .tl-seg-btn.tip-wrong { background: var(--bg); color: var(--wrong); text-decoration: line-through; }
  .tl-viewonly-tip { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 13px; width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: var(--bg); color: var(--pending); }
  .tl-viewonly-tip.correct { background: var(--correct); color: #fff; }
  .tl-viewonly-tip.wrong { background: var(--bg); color: var(--wrong); text-decoration: line-through; }
  .tl-viewonly-tip.filled { background: var(--ink); color: #fff; }
  .tl-del-match { margin-top: 12px; background: none; border: none; color: var(--wrong); font-size: 12px; font-weight: 600; cursor: pointer; opacity: .65; }
  .tl-del-match:hover { opacity: 1; }
  .tl-save-round { display: block; margin: 0 0 16px auto; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 13px; padding: 9px 22px; background: var(--pitch); color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  .tl-save-round:hover { background: var(--pitch-dark); }
  .tl-addmatch { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding: 14px 16px; background: var(--surface); border: 1.5px dashed var(--line); border-radius: 14px; }
  .tl-addmatch input { background: var(--bg); border: 1.5px solid var(--line); color: var(--ink); font-family: 'Inter', sans-serif; padding: 8px 10px; border-radius: 8px; font-size: 13px; }
  .tl-addmatch input.teams { width: 150px; }
  .tl-addmatch input.date { width: 120px; }
  .tl-addmatch button { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 13px; padding: 9px 16px; background: var(--pitch); color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  .tl-addmatch button:hover { background: var(--pitch-dark); }
  .tl-vs-label { color: var(--ink-dim); font-size: 12px; }
  table.tl-standings { width: 100%; border-collapse: collapse; font-size: 14px; background: var(--surface); border-radius: 14px; overflow: hidden; border: 1px solid var(--line); }
  table.tl-standings th, table.tl-standings td { padding: 12px 14px; border-bottom: 1px solid var(--line); text-align: left; }
  table.tl-standings tr:last-child td { border-bottom: none; }
  table.tl-standings th { color: var(--ink-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700; }
  .tl-rank { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px; color: var(--ink-dim); }
  .tl-rank.gold { color: var(--amber); }
  .tl-rank.silver { color: #9AA79E; }
  .tl-rank.bronze { color: #B57A50; }
  .tl-points { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; color: var(--pitch-dark); }
  .tl-name-cell { font-weight: 600; }
  .tl-history { display: flex; flex-direction: column; gap: 22px; }
  .tl-history-round-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 17px; margin-bottom: 8px; }
  .tl-history-table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); }
  table.tl-history-table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
  table.tl-history-table th, table.tl-history-table td { padding: 10px 12px; border-bottom: 1px solid var(--line); text-align: center; }
  table.tl-history-table tr:last-child td { border-bottom: none; }
  table.tl-history-table th { color: var(--ink-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
  .tl-history-teams { text-align: left; font-weight: 600; }
  .tl-history-teams .vs { color: var(--ink-dim); font-weight: 400; margin: 0 6px; }
  .tl-history-result { display: inline-flex; width: 24px; height: 24px; align-items: center; justify-content: center; border-radius: 6px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; background: var(--bg); color: var(--pending); }
  .tl-history-result.set { background: var(--ink); color: #fff; }
  .tl-history-tip { display: inline-flex; width: 22px; height: 22px; align-items: center; justify-content: center; border-radius: 6px; font-weight: 700; font-size: 12px; color: var(--ink-dim); background: var(--bg); }
  .tl-history-tip.empty { color: var(--pending); }
  .tl-history-tip.correct { background: var(--correct); color: #fff; }
  .tl-history-tip.wrong { color: var(--wrong); text-decoration: line-through; background: var(--bg); }
  .tl-hint { font-size: 12px; color: var(--ink-dim); margin-top: 18px; line-height: 1.6; }
  @media (max-width: 520px) { .tl-teams { font-size: 15px; } .tl-tip-player { min-width: 54px; font-size: 12px; } }
</style>

<body>

<div id="root">Načítám appku…</div>

<script>
(function () {
  "use strict";

  var BLOB_ID = ""; // <-- SEM vlož ID z banneru po prvním spuštění a znovu ulož soubor na GitHub

  var STORAGE_BASE = "https://api.extendsclass.com/json-storage";

  function blobGet(id) {
    return fetch(STORAGE_BASE + "/bin/" + id, { cache: "no-store" })
      .then(function (res) {
        if (!res.ok) throw new Error("blobGet failed: " + res.status);
        return res.json();
      });
  }

  function blobSet(id, data) {
    return fetch(STORAGE_BASE + "/bin/" + id, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    }).then(function (res) {
      if (!res.ok) throw new Error("blobSet failed: " + res.status);
    });
  }

  function blobCreate(data) {
    return fetch(STORAGE_BASE + "/bins", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    }).then(function (res) {
      if (!res.ok) throw new Error("blobCreate failed: " + res.status);
      return res.json();
    }).then(function (json) {
      return json.id;
    });
  }

  var TEAMS = ["Slavia", "Sparta", "Plzeň", "Olomouc", "Jablonec", "Baník", "Slovácko", "Hradec Králové", "Pardubice", "Zlín", "Teplice", "Bohemians", "Artis", "Mladá Boleslav", "Liberec", "Zbrojovka"];
  var PLAYERS = ["Michal", "Kuba", "Taťka", "Tomáš", "Jirka", "Honza"];
  var ADMIN_PIN = "2026";
  var OPTIONS = ["1", "0", "2"];
  var OPTION_LABEL = { "1": "Domácí", "0": "Remíza", "2": "Hosté" };

  function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
  function emptyTips() { var t = {}; PLAYERS.forEach(function (p) { t[p] = null; }); return t; }
  function esc(str) {
    return String(str === null || str === undefined ? "" : str)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  var state = {
    rounds: [],
    loaded: false,
    tab: "zapasy",
    activeRoundId: null,
    isAdmin: false,
    showPinBox: false,
    pinError: false,
    editRoundId: null,
    draftMatches: {},
    newMatchDraft: {},
    isRefreshing: false,
    justRefreshed: false,
    saveStatus: "idle",
    setupBlobId: null
  };
  var lastPayload = null;

  function loadData(manual) {
    if (manual) { state.isRefreshing = true; render(); }

    if (!BLOB_ID) {
      blobCreate({ rounds: [] }).then(function (newId) {
        state.setupBlobId = newId;
        state.rounds = [];
        state.loaded = true;
        if (manual) state.isRefreshing = false;
        render();
      }).catch(function () {
        state.setupBlobId = "ERROR";
        state.loaded = true;
        if (manual) state.isRefreshing = false;
        render();
      });
      return;
    }

    blobGet(BLOB_ID).then(function (data) {
      var parsed = Array.isArray(data.rounds) ? data.rounds : [];
      state.rounds = parsed;
      var stillExists = state.activeRoundId && parsed.some(function (r) { return r.id === state.activeRoundId; });
      if (!stillExists) {
        state.activeRoundId = parsed.length ? parsed[parsed.length - 1].id : null;
      }
      state.loaded = true;
      if (manual) {
        state.isRefreshing = false;
        state.justRefreshed = true;
        setTimeout(function () { state.justRefreshed = false; render(); }, 1500);
      }
      render();
    }).catch(function () {
      state.loaded = true;
      if (manual) state.isRefreshing = false;
      render();
    });
  }

  function persist(next) {
    state.rounds = next;
    lastPayload = next;
    render();

    if (!BLOB_ID) { state.saveStatus = "error"; render(); return; }

    state.saveStatus = "saving";
    render();
    blobSet(BLOB_ID, { rounds: next }).then(function () {
      state.saveStatus = "saved";
      render();
      setTimeout(function () {
        if (state.saveStatus === "saved") { state.saveStatus = "idle"; render(); }
      }, 1800);
    }).catch(function () {
      state.saveStatus = "error";
      render();
    });
  }

  window.tlRefresh = function () { loadData(true); };

  window.tlShowPinBox = function () { state.showPinBox = true; render(); };
  window.tlPinInputKeydown = function (e) { if (e.key === "Enter") window.tlTryLogin(); };
  window.tlTryLogin = function () {
    var val = document.getElementById("tl-pin-input").value;
    if (val === ADMIN_PIN) { state.isAdmin = true; state.showPinBox = false; state.pinError = false; }
    else { state.pinError = true; }
    render();
  };
  window.tlLogout = function () { state.isAdmin = false; render(); };

  window.tlSetTab = function (t) { state.tab = t; render(); };
  window.tlSetActiveRound = function (id) { state.activeRoundId = id; render(); };

  window.tlAddRound = function () {
    var nextNumber = 1;
    if (state.rounds.length) {
      nextNumber = Math.max.apply(null, state.rounds.map(function (r) { return r.number; })) + 1;
    }
    var round = { id: uid(), number: nextNumber, matches: [] };
    var next = state.rounds.concat([round]);
    state.activeRoundId = round.id;
    persist(next);
  };

  window.tlDeleteRound = function (roundId) {
    var next = state.rounds.filter(function (r) { return r.id !== roundId; });
    if (state.activeRoundId === roundId) {
      state.activeRoundId = next.length ? next[next.length - 1].id : null;
    }
    persist(next);
  };

  window.tlAddMatch = function (roundId) {
    var d = state.newMatchDraft[roundId] || {};
    var home = (d.home || "").trim();
    var away = (d.away || "").trim();
    if (!home || !away || home === away) return;
    var date = (d.date || "").trim();
    var next = state.rounds.map(function (r) {
      if (r.id !== roundId) return r;
      var matches = r.matches.concat([{ id: uid(), home: home, away: away, date: date, result: null, tips: emptyTips() }]);
      var copy = {}; for (var k in r) copy[k] = r[k]; copy.matches = matches;
      return copy;
    });
    state.newMatchDraft[roundId] = { home: "", away: "", date: "" };
    persist(next);
  };

  window.tlNewMatchInput = function (roundId, field, value) {
    if (!state.newMatchDraft[roundId]) state.newMatchDraft[roundId] = {};
    state.newMatchDraft[roundId][field] = value;
  };

  window.tlDeleteMatch = function (roundId, matchId) {
    var next = state.rounds.map(function (r) {
      if (r.id !== roundId) return r;
      var copy = {}; for (var k in r) copy[k] = r[k];
      copy.matches = r.matches.filter(function (m) { return m.id !== matchId; });
      return copy;
    });
    persist(next);
  };

  window.tlToggleEditRound = function (roundId) {
    if (state.editRoundId === roundId) { state.editRoundId = null; state.draftMatches = {}; render(); return; }
    var round = null;
    for (var i = 0; i < state.rounds.length; i++) { if (state.rounds[i].id === roundId) { round = state.rounds[i]; break; } }
    var draft = {};
    round.matches.forEach(function (m) { draft[m.id] = { home: m.home, away: m.away, date: m.date || "" }; });
    state.draftMatches = draft;
    state.editRoundId = roundId;
    render();
  };

  window.tlDraftInput = function (matchId, field, value) {
    if (!state.draftMatches[matchId]) state.draftMatches[matchId] = {};
    state.draftMatches[matchId][field] = value;
  };

  window.tlSaveEditRound = function (roundId) {
    var draftMatches = state.draftMatches;
    var next = state.rounds.map(function (r) {
      if (r.id !== roundId) return r;
      var matches = r.matches.map(function (m) {
        var d = draftMatches[m.id];
        if (!d) return m;
        var home = (d.home || "").trim() || m.home;
        var away = (d.away || "").trim() || m.away;
        var date = (d.date || "").trim();
        var copy = {}; for (var k in m) copy[k] = m[k];
        copy.home = home; copy.away = away; copy.date = date;
        return copy;
      });
      var rcopy = {}; for (var k2 in r) rcopy[k2] = r[k2]; rcopy.matches = matches;
      return rcopy;
    });
    state.editRoundId = null;
    state.draftMatches = {};
    persist(next);
  };

  window.tlSetTip = function (roundId, matchId, player, value) {
    var next = state.rounds.map(function (r) {
      if (r.id !== roundId) return r;
      var matches = r.matches.map(function (m) {
        if (m.id !== matchId) return m;
        var nextVal = m.tips[player] === value ? null : value;
        var tips = {}; for (var k in m.tips) tips[k] = m.tips[k];
        tips[player] = nextVal;
        var copy = {}; for (var k2 in m) copy[k2] = m[k2]; copy.tips = tips;
        return copy;
      });
      var rcopy = {}; for (var k3 in r) rcopy[k3] = r[k3]; rcopy.matches = matches;
      return rcopy;
    });
    persist(next);
  };

  window.tlSetResult = function (roundId, matchId, value) {
    var next = state.rounds.map(function (r) {
      if (r.id !== roundId) return r;
      var matches = r.matches.map(function (m) {
        if (m.id !== matchId) return m;
        var copy = {}; for (var k in m) copy[k] = m[k];
        copy.result = (m.result === value ? null : value);
        return copy;
      });
      var rcopy = {}; for (var k2 in r) rcopy[k2] = r[k2]; rcopy.matches = matches;
      return rcopy;
    });
    persist(next);
  };

  window.tlRetrySave = function () { if (lastPayload) persist(lastPayload); };

  function computeStandings() {
    var stats = {};
    PLAYERS.forEach(function (p) { stats[p] = { points: 0, correct: 0, played: 0 }; });
    state.rounds.forEach(function (r) {
      r.matches.forEach(function (m) {
        if (m.result === null || m.result === undefined) return;
        PLAYERS.forEach(function (p) {
          var tip = m.tips[p];
          if (tip === null || tip === undefined) return;
          stats[p].played += 1;
          if (tip === m.result) { stats[p].points += 1; stats[p].correct += 1; }
        });
      });
    });
    var result = PLAYERS.map(function (p) {
      return { name: p, points: stats[p].points, correct: stats[p].correct, played: stats[p].played };
    });
    result.sort(function (a, b) { return b.points - a.points || b.correct - a.correct; });
    return result;
  }

  function render() {
    var root = document.getElementById("root");
    root.innerHTML = renderHeader() + renderSetupBanner() + renderNav() + renderBody();
  }

  function renderHeader() {
    var right = "";

    if (state.isAdmin && state.saveStatus !== "idle") {
      var inner = "";
      if (state.saveStatus === "saving") inner = "Ukládám…";
      else if (state.saveStatus === "saved") inner = "Uloženo ✓";
      else if (state.saveStatus === "error") inner = "Uložení se nezdařilo" + '<button class="tl-retry" onclick="tlRetrySave()">zkusit znovu</button>';
      right += '<div class="tl-save-indicator ' + state.saveStatus + '">' + inner + "</div>";
    }

    var refreshClasses = "tl-refresh-pill" + (state.isRefreshing ? " spinning" : "") + (state.justRefreshed ? " done" : "");
    right += '<button class="' + refreshClasses + '" onclick="tlRefresh()"' + (state.isRefreshing ? " disabled" : "") + ">" +
      '<span class="tl-refresh-icon">&#8635;</span>' + (state.justRefreshed ? "Aktualizováno" : "Aktualizovat") + "</button>";

    if (!state.isAdmin && !state.showPinBox) {
      right += '<button class="tl-admin-pill" onclick="tlShowPinBox()">Admin re&#382;im</button>';
    } else if (!state.isAdmin && state.showPinBox) {
      right += '<div class="tl-pinbox">' +
        '<input id="tl-pin-input" type="password" placeholder="PIN" maxlength="8" onkeydown="tlPinInputKeydown(event)">' +
        '<button class="tl-admin-pill" onclick="tlTryLogin()">OK</button>' +
        (state.pinError ? '<span class="tl-pin-err">Chybny PIN</span>' : "") +
        "</div>";
    } else if (state.isAdmin) {
      right += '<button class="tl-admin-pill on" onclick="tlLogout()">Admin - odhlasit</button>';
    }

    return '<div class="tl-header"><div class="tl-brand"><div class="tl-logo">Tipuj<em>Ligu</em></div>' +
      '<div class="tl-sub">Chance Liga 26/27</div></div><div class="tl-header-right">' + right + "</div></div>";
  }

  function renderSetupBanner() {
    if (state.setupBlobId && state.setupBlobId !== "ERROR") {
      return '<div class="tl-setup-banner"><strong>Jednorazove nastaveni:</strong> appka vytvorila sdilene uloziste dat. Zkopiruj tohle ID:<br>' +
        "<code>" + esc(state.setupBlobId) + "</code><br>" +
        'a v souboru index.html nahrad radek <code>var BLOB_ID = "";</code> za <code>var BLOB_ID = "' + esc(state.setupBlobId) + '";</code>, pak soubor znovu uloz na GitHub.</div>';
    }
    if (state.setupBlobId === "ERROR") {
      return '<div class="tl-setup-banner">Nepodarilo se vytvorit uloziste dat. Zkus obnovit stranku.</div>';
    }
    return "";
  }

  function renderNav() {
    function item(key, label) {
      return '<div class="tl-navitem ' + (state.tab === key ? "active" : "") + '" onclick="tlSetTab(\'' + key + '\')">' + label + "</div>";
    }
    return '<div class="tl-nav">' + item("zapasy", "Z&aacute;pasy") + item("tabulka", "Tabulka") + item("historie", "P&#345;ehled kol") + "</div>";
  }

  function renderBody() {
    if (!state.loaded) return '<div class="tl-body"><div class="tl-empty">Na&#269;&iacute;t&aacute;m data&hellip;</div></div>';
    if (state.tab === "zapasy") return '<div class="tl-body">' + renderZapasy() + "</div>";
    if (state.tab === "tabulka") return '<div class="tl-body">' + renderTabulka() + "</div>";
    return '<div class="tl-body">' + renderHistorie() + "</div>";
  }

  function renderZapasy() {
    var sortedRounds = state.rounds.slice().sort(function (a, b) { return a.number - b.number; });
    var html = '<div class="tl-roundbar">';
    sortedRounds.forEach(function (r) {
      html += '<div class="tl-round-chip ' + (r.id === state.activeRoundId ? "active" : "") + '" onclick="tlSetActiveRound(\'' + r.id + '\')">Kolo ' + r.number + "</div>";
    });
    if (state.isAdmin) html += '<button class="tl-add-round" onclick="tlAddRound()">+ Nov&eacute; kolo</button>';
    html += "</div>";

    var activeRound = null;
    for (var i = 0; i < state.rounds.length; i++) { if (state.rounds[i].id === state.activeRoundId) { activeRound = state.rounds[i]; break; } }

    if (!activeRound) {
      var msg = state.rounds.length === 0
        ? (state.isAdmin ? "Zat&iacute;m &#382;&aacute;dn&eacute; kolo. Klikni na &bdquo;+ Nov&eacute; kolo&ldquo; a za&#269;ni zad&aacute;vat z&aacute;pasy." : "Zat&iacute;m nejsou &#382;&aacute;dn&aacute; kola. Spr&aacute;vce je brzy p&#345;id&aacute;.")
        : "Vyber kolo naho&#345;e.";
      return html + '<div class="tl-empty">' + msg + "</div>" + renderTeamsDatalist();
    }

    html += '<div><div class="tl-round-head"><div class="tl-round-title">Kolo ' + activeRound.number + "</div>";
    if (state.isAdmin) {
      html += '<div class="tl-round-actions">' +
        '<button class="tl-edit-round" onclick="tlToggleEditRound(\'' + activeRound.id + '\')">' + (state.editRoundId === activeRound.id ? "zru&scaron;it &uacute;pravu" : "upravit kolo") + "</button>" +
        '<button class="tl-del-round" onclick="tlDeleteRound(\'' + activeRound.id + '\')">smazat kolo</button></div>';
    }
    html += "</div>";

    if (activeRound.matches.length === 0) {
      html += '<div class="tl-empty">V tomto kole je&scaron;t&#283; nejsou &#382;&aacute;dn&eacute; z&aacute;pasy.</div>';
    }

    var editing = state.editRoundId === activeRound.id;

    activeRound.matches.forEach(function (m) {
      html += '<div class="tl-match-card">';
      html += '<div class="tl-match-top"><div>';
      if (editing) {
        var d = state.draftMatches[m.id] || { home: m.home, away: m.away, date: m.date || "" };
        html += '<div class="tl-edit-fields">' +
          '<input class="teams" list="tl-teams-list" value="' + esc(d.home) + '" oninput="tlDraftInput(\'' + m.id + '\',\'home\',this.value)">' +
          '<span class="tl-vs-label">vs</span>' +
          '<input class="teams" list="tl-teams-list" value="' + esc(d.away) + '" oninput="tlDraftInput(\'' + m.id + '\',\'away\',this.value)">' +
          '<input class="date" placeholder="25.7. 17:00" value="' + esc(d.date) + '" oninput="tlDraftInput(\'' + m.id + '\',\'date\',this.value)">' +
          "</div>";
      } else {
        html += '<div class="tl-teams">' + esc(m.home) + '<span class="vs">vs</span>' + esc(m.away) + "</div>";
        if (m.date) html += '<div class="tl-date">' + esc(m.date) + "</div>";
      }
      html += "</div>";

      html += '<div class="tl-segmented">';
      OPTIONS.forEach(function (opt) {
        var cls = "tl-seg-btn " + (state.isAdmin ? "clickable" : "") + " " + (m.result === opt ? "result-active" : "");
        var onclickAttr = state.isAdmin ? (' onclick="tlSetResult(\'' + activeRound.id + '\',\'' + m.id + '\',\'' + opt + '\')"') : "";
        html += '<button class="' + cls + '" title="' + OPTION_LABEL[opt] + '"' + onclickAttr + ">" + opt + "</button>";
      });
      html += "</div></div>";

      html += '<div class="tl-tip-rows">';
      PLAYERS.forEach(function (p) {
        var tip = m.tips[p];
        html += '<div class="tl-tip-row"><span class="tl-tip-player">' + p + "</span>";
        if (state.isAdmin) {
          html += '<div class="tl-segmented">';
          OPTIONS.forEach(function (opt) {
            var cls = "tl-seg-btn clickable";
            if (tip === opt) {
              if (m.result !== null && m.result !== undefined) cls += (tip === m.result ? " tip-correct" : " tip-wrong");
              else cls += " tip-active";
            } else {
              cls += " tip-empty";
            }
            html += '<button class="' + cls + '" onclick="tlSetTip(\'' + activeRound.id + '\',\'' + m.id + '\',\'' + p + '\',\'' + opt + '\')">' + opt + "</button>";
          });
          html += "</div>";
        } else {
          var filled = (tip !== null && tip !== undefined);
          var vcls = "tl-viewonly-tip";
          if (filled) {
            if (m.result !== null && m.result !== undefined) vcls += (tip === m.result ? " correct" : " wrong");
            else vcls += " filled";
          }
          html += '<div class="' + vcls + '">' + (filled ? tip : "&ndash;") + "</div>";
        }
        html += "</div>";
      });
      html += "</div>";

      if (state.isAdmin) {
        html += '<button class="tl-del-match" onclick="tlDeleteMatch(\'' + activeRound.id + '\',\'' + m.id + '\')">smazat z&aacute;pas</button>';
      }
      html += "</div>";
    });

    if (editing) {
      html += '<button class="tl-save-round" onclick="tlSaveEditRound(\'' + activeRound.id + '\')">Ulo&#382;it</button>';
    }

    if (state.isAdmin) {
      var nd = state.newMatchDraft[activeRound.id] || { home: "", away: "", date: "" };
      html += '<div class="tl-addmatch">' +
        '<input class="teams" list="tl-teams-list" placeholder="Dom&aacute;c&iacute;" value="' + esc(nd.home) + '" oninput="tlNewMatchInput(\'' + activeRound.id + '\',\'home\',this.value)">' +
        '<span class="tl-vs-label">vs</span>' +
        '<input class="teams" list="tl-teams-list" placeholder="Host&eacute;" value="' + esc(nd.away) + '" oninput="tlNewMatchInput(\'' + activeRound.id + '\',\'away\',this.value)">' +
        '<input class="date" placeholder="25.7. 17:00" value="' + esc(nd.date) + '" oninput="tlNewMatchInput(\'' + activeRound.id + '\',\'date\',this.value)">' +
        '<button onclick="tlAddMatch(\'' + activeRound.id + '\')">+ P&#345;idat z&aacute;pas</button>' +
        "</div>";
    }

    html += "</div>";
    html += renderTeamsDatalist();

    if (state.isAdmin) {
      html += '<div class="tl-hint">Klikni na 1 / 0 / 2 u hr&aacute;&#269;e a zadej jeho tip. Stejn&#283; nastav&iacute;&scaron; v&yacute;sledek z&aacute;pasu vpravo naho&#345;e v kart&#283;.<br>Data se ukl&aacute;daj&iacute; automaticky a jsou vid&#283;t v&scaron;em, kdo appku otev&#345;ou.</div>';
    }

    return html;
  }

  function renderTeamsDatalist() {
    var opts = TEAMS.map(function (t) { return '<option value="' + esc(t) + '"></option>'; }).join("");
    return '<datalist id="tl-teams-list">' + opts + "</datalist>";
  }

  function renderTabulka() {
    var rows = "";
    var standings = computeStandings();
    for (var i = 0; i < standings.length; i++) {
      var s = standings[i];
      var rankCls = i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "";
      var pct = s.played ? Math.round((s.correct / s.played) * 100) + "%" : "&ndash;";
      rows += "<tr><td><span class=\"tl-rank " + rankCls + "\">" + (i + 1) + "</span></td>" +
        '<td class="tl-name-cell">' + s.name + "</td>" +
        "<td>" + s.played + "</td><td>" + s.correct + "</td><td>" + pct + '</td><td><span class="tl-points">' + s.points + "</span></td></tr>";
    }
    return '<table class="tl-standings"><thead><tr><th>#</th><th>Hr&aacute;&#269;</th><th>Odehr&aacute;no</th><th>Trefeno</th><th>&Uacute;sp&#283;&scaron;nost</th><th>Body</th></tr></thead><tbody>' + rows + "</tbody></table>";
  }

  function renderHistorie() {
    if (state.rounds.length === 0) return '<div class="tl-empty">P&#345;ehled je zat&iacute;m pr&aacute;zdn&yacute; &mdash; nejsou &#382;&aacute;dn&aacute; kola.</div>';
    var sorted = state.rounds.slice().sort(function (a, b) { return b.number - a.number; });
    var html = '<div class="tl-history">';
    sorted.forEach(function (r) {
      html += '<div class="tl-history-round"><div class="tl-history-round-title">Kolo ' + r.number + "</div>";
      if (r.matches.length === 0) {
        html += '<div class="tl-empty">&#381;&aacute;dn&eacute; z&aacute;pasy.</div>';
      } else {
        html += '<div class="tl-history-table-wrap"><table class="tl-history-table"><thead><tr><th>Z&aacute;pas</th><th>V&yacute;sledek</th>';
        PLAYERS.forEach(function (p) { html += "<th>" + p + "</th>"; });
        html += "</tr></thead><tbody>";
        r.matches.forEach(function (m) {
          html += '<tr><td class="tl-history-teams">' + esc(m.home) + '<span class="vs">&ndash;</span>' + esc(m.away) +
            (m.date ? '<div class="tl-date">' + esc(m.date) + "</div>" : "") + "</td>";
          html += '<td><span class="tl-history-result ' + (m.result !== null && m.result !== undefined ? "set" : "") + '">' + (m.result !== null && m.result !== undefined ? m.result : "&ndash;") + "</span></td>";
          PLAYERS.forEach(function (p) {
            var tip = m.tips[p];
            var cls = "tl-history-tip";
            var hasTip = (tip !== null && tip !== undefined);
            if (!hasTip) cls += " empty";
            else if (m.result !== null && m.result !== undefined) cls += (tip === m.result ? " correct" : " wrong");
            html += "<td><span class=\"" + cls + "\">" + (hasTip ? tip : "&ndash;") + "</span></td>";
          });
          html += "</tr>";
        });
        html += "</tbody></table></div>";
      }
      html += "</div>";
    });
    html += "</div>";
    return html;
  }

  loadData(false);
})();
</script>
</body>
</html>
